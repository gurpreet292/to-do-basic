<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A premium, glassmorphism-designed To-Do List to organize your daily tasks with productivity statistics, category tags, priority levels, and smooth animations.">
    <title>Taskflow // Premium To-Do List</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Main glassmorphism card -->
        <main class="todo-card" id="todoCard">
            <!-- Header Section with Greeting and Date -->
            <header class="todo-header">
                <div class="header-left">
                    <span class="date-today" id="currentDate">Saturday, May 23</span>
                    <h1 class="greeting-title" id="greetingText">Hey there!</h1>
                    <p class="subtitle">Let's make today productive.</p>
                </div>
                <div class="header-right">
                    <div class="progress-ring-container">
                        <svg class="progress-ring" width="60" height="60">
                            <circle class="progress-ring__circle-bg" stroke="rgba(255, 255, 255, 0.1)" stroke-width="4" fill="transparent" r="24" cx="30" cy="30"/>
                            <circle class="progress-ring__circle" id="progressCircle" stroke="url(#progressGradient)" stroke-width="4" fill="transparent" r="24" cx="30" cy="30"/>
                            <defs>
                                <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#a855f7" />
                                    <stop offset="100%" stop-color="#ec4899" />
                                </linearGradient>
                            </defs>
                        </svg>
                        <div class="progress-text" id="progressPercentage">0%</div>
                    </div>
                </div>
            </header>

            <!-- Stats Bar -->
            <section class="stats-bar" aria-label="Task Statistics">
                <div class="stat-item">
                    <span class="stat-num" id="totalTasksCount">0</span>
                    <span class="stat-label">Created</span>
                </div>
                <div class="stat-item">
                    <span class="stat-num" id="completedTasksCount">0</span>
                    <span class="stat-label">Completed</span>
                </div>
                <div class="stat-item">
                    <span class="stat-num" id="pendingTasksCount">0</span>
                    <span class="stat-label">Pending</span>
                </div>
            </section>

            <!-- Task Input Form -->
            <form class="todo-form" id="todoForm" autocomplete="off">
                <div class="input-wrapper">
                    <i class="fa-solid fa-circle-plus input-icon"></i>
                    <input type="text" id="taskInput" placeholder="Add a new task..." required aria-label="New task input">
                </div>
                <div class="form-options">
                    <div class="select-wrapper">
                        <i class="fa-solid fa-tag select-icon"></i>
                        <select id="taskCategory" aria-label="Task category">
                            <option value="personal">Personal</option>
                            <option value="work">Work</option>
                            <option value="shopping">Shopping</option>
                            <option value="health">Health</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="select-wrapper">
                        <i class="fa-solid fa-triangle-exclamation select-icon"></i>
                        <select id="taskPriority" aria-label="Task priority">
                            <option value="low">Low Priority</option>
                            <option value="medium" selected>Medium Priority</option>
                            <option value="high">High Priority</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-add" id="addTaskBtn" aria-label="Add Task">
                        <span>Add</span>
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </form>

            <!-- Filters and Actions -->
            <div class="todo-controls">
                <div class="filter-tabs" role="tablist">
                    <button class="filter-tab active" data-filter="all" role="tab" aria-selected="true">All</button>
                    <button class="filter-tab" data-filter="pending" role="tab" aria-selected="false">Active</button>
                    <button class="filter-tab" data-filter="completed" role="tab" aria-selected="false">Completed</button>
                </div>
                <button class="btn-clear" id="clearCompletedBtn" aria-label="Clear completed tasks">
                    <i class="fa-regular fa-trash-can"></i> Clear Completed
                </button>
            </div>

            <!-- Task List -->
            <div class="task-list-container">
                <ul class="task-list" id="taskList">
                    <!-- Dynamic tasks will be inserted here -->
                </ul>
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon-wrapper">
                        <i class="fa-solid fa-clipboard-list"></i>
                    </div>
                    <p class="empty-title">All tasks caught up!</p>
                    <p class="empty-subtitle">Add a task above to get started on your goals.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Notification Container -->
    <div class="toast-container" id="toastContainer" aria-live="polite"></div>

    <!-- Custom Script -->
    <script src="script.js"></script>
</body>
</html>
